# -------------------------------------------------------------------
# MetaAI Platform - CI/CD Pipeline
# Triggered on push/PR to main, develop, or release branches.
# Builds Docker images, pushes to GHCR, deploys to production VPS.
# -------------------------------------------------------------------
name: CI/CD Pipeline

on:
  push:
    branches: [main, develop, 'release/*']
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

# -------------------------------------------------------------------
# TEST - Runs linting and unit tests on every push/PR
# -------------------------------------------------------------------
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest pytest-asyncio ruff
      
      # Lint check - currently non-blocking during initial development
      - name: Lint with ruff
        run: ruff check backend/ || true
      
      # Unit tests - non-blocking while test coverage is being expanded
      - name: Run tests
        run: pytest backend/tests/ -v --tb=short
        continue-on-error: true

  # -------------------------------------------------------------------
  # BUILD - Builds and pushes Docker images to GitHub Container Registry
  # Only runs on main branch pushes after tests pass.
  # Creates both :latest and :<sha> tagged images for traceability.
  # -------------------------------------------------------------------
  build:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      # Authenticate to GHCR using the built-in GITHUB_TOKEN
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      # GHCR requires lowercase image names; transform repo name
      - name: Lowercase image name
        run: echo "IMAGE_NAME=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
      
      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # -------------------------------------------------------------------
  # DEPLOY - Pulls latest images on VPS and restarts containers.
  # Uses SSH with extended timeout and retry for resource-constrained hosts.
  # Images are pulled per-service to avoid OOM on free-tier VMs.
  # -------------------------------------------------------------------
  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    # Increase job timeout for slow VPS connections
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      
      # Use webfactory/ssh-agent for key loading (handles agent lifecycle).
      # VPS may be down (free-tier), so known_hosts is populated with || true
      # to let the retry logic in Deploy step handle connectivity.
      - name: Install SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_KEY }}
      
      - name: Add VPS to known hosts
        run: ssh-keyscan -H 80.225.207.230 >> ~/.ssh/known_hosts || echo "Warning: VPS unreachable, known_hosts entry skipped"
      
      - name: Deploy to VPS
        run: |
          # SSH options: extended connect timeout, keepalive, retry, accept-new host key
          SSH_OPTS="-o ConnectTimeout=60 -o ServerAliveInterval=30 -o ServerAliveCountMax=3 -o StrictHostKeyChecking=accept-new"
          SSH_CMD="ssh $SSH_OPTS sushant@80.225.207.230"
          
          # Retry wrapper for SSH commands
          retry_ssh() {
            local max_attempts=3
            local attempt=1
            until $SSH_CMD "$1"; do
              if [ $attempt -ge $max_attempts ]; then
                echo "SSH failed after $max_attempts attempts"
                return 1
              fi
              echo "SSH attempt $attempt failed, retrying in 10s..."
              sleep 10
              attempt=$((attempt + 1))
            done
          }
          
          retry_ssh "
            set -e
            
            echo '=== Pulling latest code ==='
            cd ~/platform/metaai
            git pull origin main
            
            echo '=== Updating docker-compose ==='
            cp deployment/docker-compose.yml docker-compose.yml
            
            echo '=== Pulling images per-service (avoids OOM) ==='
            # Pull one service at a time to prevent memory exhaustion on free-tier VM
            docker compose pull postgres
            docker compose pull redis
            docker compose pull qdrant
            docker compose pull backend
            docker compose pull frontend
            
            echo '=== Restarting all services ==='
            docker compose down
            docker compose up -d
            
            echo '=== Waiting for health check (30s) ==='
            sleep 30
            
            echo '=== Verifying backend ==='
            curl -sf http://localhost:8000/health && echo 'Backend OK' || exit 1
            
            echo '=== Cleaning up ==='
            docker image prune -f
            
            echo '=== Deployment complete ==='
          "
      
      - name: Public Health Check
        run: |
          sleep 15
          curl -sf --max-time 10 https://sushantdev.com/MetaAIPlatform/health && echo 'Public endpoint OK' || echo 'Warning: public endpoint not yet available'
