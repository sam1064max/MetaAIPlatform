name: CI/CD Pipeline

on:
  push:
    branches: [main, develop, 'release/*']
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest pytest-asyncio ruff
      
      - name: Lint with ruff
        run: ruff check backend/ || true
      
      - name: Run tests
        run: pytest backend/tests/ -v --tb=short
        continue-on-error: true

  build:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Lowercase image name
        run: echo "IMAGE_NAME=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
      
      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 80.225.207.230 >> ~/.ssh/known_hosts
      
      - name: Deploy to VPS
        run: |
          ssh sushant@80.225.207.230 "
            set -e
            echo '=== Pulling latest code ==='
            cd ~/platform/metaai
            git pull origin main
            
            echo '=== Updating docker-compose ==='
            cp deployment/docker-compose.yml docker-compose.yml
            
            echo '=== Pulling latest images ==='
            docker compose pull
            
            echo '=== Restarting services ==='
            docker compose down
            docker compose up -d
            
            echo '=== Waiting for health check ==='
            sleep 15
            
            echo '=== Verifying backend ==='
            curl -sf http://localhost:8000/health && echo 'Backend OK' || exit 1
            
            echo '=== Cleaning up ==='
            docker image prune -f
            
            echo '=== Deployment complete ==='
          "
      
      - name: Public Health Check
        run: |
          sleep 10
          curl -sf https://sushantdev.com/MetaAIPlatform/health && echo 'Public endpoint OK' || echo 'Warning: public endpoint not yet available'
