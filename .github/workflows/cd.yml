name: CD
on:
  push:
    branches: [develop, main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  REGISTRY_USER: ${{ github.actor }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ env.REGISTRY_USER }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute version
        id: version
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "version=${{ github.sha }}" >> $GITHUB_OUTPUT
          else
            echo "version=staging-${{ github.sha }}" >> $GITHUB_OUTPUT
          fi
      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/sam1064max/metaai-backend:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/sam1064max/metaai-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/sam1064max/metaai-frontend:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/sam1064max/metaai-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
  deploy-staging:
    needs: build
    if: github.ref_name == 'develop'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Install SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_KEY }}
      - name: Deploy to staging VPS
        run: |
          SSH_CMD="ssh -o ConnectTimeout=60 -o ServerAliveInterval=30 -o ServerAliveCountMax=3 -o StrictHostKeyChecking=accept-new sushant@80.225.207.230"
          $SSH_CMD "
            set -e
            cd ~/platform/metaai
            export COMPOSE_FILE=docker-compose.staging.yml
            docker compose pull
            docker compose down
            docker compose up -d
            docker image prune -f
          "

  deploy-production:
    needs: build
    if: github.ref_name == 'main'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Install SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_KEY }}
      - name: Deploy to production VPS
        run: |
          retry_ssh() {
            local max=3 attempt=1
            until ssh -o ConnectTimeout=60 -o ServerAliveInterval=30 -o ServerAliveCountMax=3 -o StrictHostKeyChecking=accept-new sushant@80.225.207.230 "$1"; do
              if [ $attempt -ge $max ]; then echo "SSH failed after $max attempts"; return 1; fi
              echo "Attempt $attempt failed, retrying in 10s..."; sleep 10; attempt=$((attempt + 1))
            done
          }
          retry_ssh "
            set -e
            cd ~/platform/metaai
            docker compose pull
            docker compose down
            docker compose up -d
            sleep 15
            curl -sf http://localhost:8000/health && echo 'Health OK' || exit 1
            docker image prune -f
          "
