version: "3.8"

services:
  backend:
    image: ghcr.io/sam1064max/metaai-backend:latest
    container_name: metaai-backend
    restart: unless-stopped
    expose:
      - "8000"
    networks:
      - web
    environment:
      - ENVIRONMENT=production
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/metaai
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_URL=http://qdrant:6333
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - SECRET_KEY=${SECRET_KEY:-change-me-too}
    env_file:
      - .env
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.metaai-api.rule=Host(`metaai-api.sushantdev.com`)"
      - "traefik.http.routers.metaai-api.entrypoints=websecure"
      - "traefik.http.routers.metaai-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.metaai-api.loadbalancer.server.port=8000"
      - "traefik.http.routers.metaai-api.priority=100"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    image: ghcr.io/sam1064max/metaai-frontend:latest
    container_name: metaai-frontend
    restart: unless-stopped
    expose:
      - "8501"
    networks:
      - web
    environment:
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false
      - API_BASE_URL=https://metaai-api.sushantdev.com
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.metaai-frontend.rule=Host(`metaai.sushantdev.com`)"
      - "traefik.http.routers.metaai-frontend.entrypoints=websecure"
      - "traefik.http.routers.metaai-frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.metaai-frontend.loadbalancer.server.port=8501"
      - "traefik.http.routers.metaai-frontend.priority=50"
    depends_on:
      - backend

  postgres:
    image: postgres:16-alpine
    container_name: metaai-postgres
    restart: unless-stopped
    expose:
      - "5432"
    networks:
      - web
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=metaai
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: metaai-redis
    restart: unless-stopped
    expose:
      - "6379"
    networks:
      - web
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: metaai-qdrant
    restart: unless-stopped
    expose:
      - "6333"
    networks:
      - web
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:6333/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3

  grafana:
    image: grafana/grafana:11.3-ubuntu
    container_name: metaai-grafana
    restart: unless-stopped
    expose:
      - "3000"
    networks:
      - web
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.metaai-observability.rule=Host(`metaai-observability.sushantdev.com`)"
      - "traefik.http.routers.metaai-observability.entrypoints=websecure"
      - "traefik.http.routers.metaai-observability.tls.certresolver=letsencrypt"
      - "traefik.http.services.metaai-observability.loadbalancer.server.port=3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  grafana_data:

networks:
  web:
    external: true
