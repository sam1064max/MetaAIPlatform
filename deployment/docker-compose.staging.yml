version: "3.8"

services:
  nginx:
    image: ghcr.io/sam1064max/metaai-nginx:staging
    container_name: metaai-nginx-staging
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/nginx/certs:ro
    networks:
      - metaai
    depends_on:
      - frontend
      - backend

  backend:
    image: ghcr.io/sam1064max/metaai-backend:staging
    container_name: metaai-backend-staging
    restart: unless-stopped
    expose:
      - "8000"
    networks:
      - metaai
    environment:
      - ENVIRONMENT=staging
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/metaai_staging
      - REDIS_URL=redis://redis:6379/1
      - QDRANT_URL=http://qdrant:6333
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - SECRET_KEY=${SECRET_KEY:-change-me-too}
    env_file:
      - .env.staging
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    image: ghcr.io/sam1064max/metaai-frontend:staging
    container_name: metaai-frontend-staging
    restart: unless-stopped
    expose:
      - "8501"
    networks:
      - metaai
    environment:
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false
      - API_BASE_URL=http://backend:8000
    depends_on:
      - backend

  postgres:
    image: postgres:16-alpine
    container_name: metaai-postgres-staging
    restart: unless-stopped
    expose:
      - "5432"
    networks:
      - metaai
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=metaai_staging
    volumes:
      - postgres_staging_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: metaai-redis-staging
    restart: unless-stopped
    expose:
      - "6379"
    networks:
      - metaai
    volumes:
      - redis_staging_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  postgres_staging_data:
  redis_staging_data:

networks:
  metaai:
    driver: bridge
